name: Build Leaf

on: [workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install perl
      run: sudo apt-get install -y perl g++

    - name: Build engine
      run: |
        perl src/comp.pl online_build NNUE=1 TDLEAF=1

    - name: Upload binary
      uses: actions/upload-artifact@v4
      with:
        name: Leaf-engine
        path: run/
